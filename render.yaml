envVarGroups:
  - name: chanter-scheduler-shared
    envVars:
      - key: CRON_SECRET
        generateValue: true
      - key: APP_TIME_ZONE
        value: Asia/Nicosia
      - key: TZ
        value: Asia/Nicosia

services:
  - type: web
    name: chanter-auto-poster
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CAPTION_MODEL
        value: gpt-5.5
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-mini-transcribe
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: QWEN_MODEL
        value: qwen-vl-max
      - fromGroup: chanter-scheduler-shared

  - type: cron
    name: chanter-scheduler-ping
    runtime: node
    schedule: "* * * * *"
    buildCommand: npm ci
    startCommand: npm run scheduler:ping
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_URL
        sync: false
      - fromGroup: chanter-scheduler-shared
